- name: Copy SIMPIPE to root's home directory
  hosts: all
  tasks:
    - name: Copy forwarding.py to root's home directory
      ansible.builtin.copy:
        src: ../forwarding.py
        dest: /root/simpipe-forwarding.py
        owner: root
        group: root
        mode: '0644'

    - name: Check if local SIM-PIPE chart exists
      ansible.builtin.stat:
        path: ../charts/simpipe/Chart.yaml
      register: simpipe_chart_local

    - name: Remove potentially broken helm-diff plugin for root
      ansible.builtin.file:
        path: /root/.local/share/helm/plugins/helm-diff
        state: absent


    - name: Install SIM-PIPE Helm chart (local if available, else remote)
      kubernetes.core.helm:
        name: simpipe
        release_namespace: default
        chart_ref: >-
          {{ '../charts/simpipe' if simpipe_chart_local.stat.exists else 'oci://ghcr.io/datacloud-project/simpipe' }}
        values_files: >-
          {{ ['../charts/simpipe/values.yaml'] if simpipe_chart_local.stat.exists else omit }}
        wait: true
        state: present
      environment:
        HELM_NO_PLUGINS: "1"

