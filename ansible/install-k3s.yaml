- name: Install K3S
  hosts: all
  vars:
    # Use the latest stable K3s release from the default channel.
    # This avoids incompatibilities between older K3s binaries and
    # newer Docker API versions (e.g. Docker requiring client API >= 1.44).
    k3s_release_version: false
    k3s_build_cluster: false
    k3s_install_hard_links: true
    k3s_become: true
    k3s_server:
      docker: true
      # Enable this if you run K3S inside a VM managed by another Kubernetes Cluster
      # The idea is to not use the default network CIDRs (10.42.0.0/16 and 10.43.0.0/16)
      # cluster-cidr: 10.51.0.0/16
      # service-cidr: 10.52.0.0/16
      disable:
        - traefik
      write-kubeconfig-mode: '0640'
  pre_tasks:
    - name: Override k3s_ensure_directories_exist to avoid dirname on omit
      ansible.builtin.set_fact:
        k3s_ensure_directories_exist:
          - name: Config directory
            path: "/etc/rancher/k3s"
          - name: Config.yaml.d directory
            path: "/etc/rancher/k3s/config.yaml.d"
          - name: Systemd unit file directory
            path: "/etc/systemd/system"
          - name: Data directory
            path: "/var/lib/rancher/k3s"
  roles:
    - xanmanning.k3s
