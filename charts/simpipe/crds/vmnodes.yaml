apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: vmnodes.simpipe.sct.sintef.no
spec:
  group: simpipe.sct.sintef.no
  names:
    kind: VMNode
    listKind: VMNodeList
    plural: vmnodes
    singular: vmnode
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                name:
                  type: string
                os:
                  type: string
                cpus:
                  type: string
                memory:
                  type: string
                status:
                  type: string
                  enum:
                    - running
                    - shutdown
                    - provisioning
                    - failed
              required:
                - name
                - os
                - cpus
                - memory
