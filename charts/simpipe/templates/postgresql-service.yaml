{{- if .Values.postgresql.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: simpipe-postgresql
  labels:
    app: simpipe-postgresql
    {{- include "simpipeUtils.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
  - name: postgresql
    port: 5432
    targetPort: postgresql
    protocol: TCP
  selector:
    app: simpipe-postgresql
{{- end }}
