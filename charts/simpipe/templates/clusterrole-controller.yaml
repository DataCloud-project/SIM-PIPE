# Defines a ClusterRole to grant cluster-scoped permissions for simpipe-controller(for emulation).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "simpipeController.serviceAccountName" . }}-controller-clusterrole
rules:
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list", "delete", "patch"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]  # For draining pods before deleting worker nodes after emulation
- apiGroups: ["simpipe.sct.sintef.no"]
  resources: ["resources", "projects"]
  verbs: ["get", "list", "create", "update", "delete"]
- apiGroups: ["kubevirt.io"]
  resources: ["virtualmachines"]
  verbs: ["get", "list", "create", "update", "patch", "delete"]  # Add permissions for virtualmachines