{{- if .Values.minio.enabled -}}
apiVersion: v1
kind: Secret
metadata:
  name: simpipe-minio
  labels:
    app: simpipe-minio
    {{- include "simpipeUtils.labels" . | nindent 4 }}
type: Opaque
data:
  root-user: {{ .Values.minio.rootUser | b64enc | quote }}
  root-password: {{ .Values.minio.rootPassword | b64enc | quote }}
{{- end }}
